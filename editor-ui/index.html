<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carousel Drafter – Éditeur</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1d1d1f;
    color: white;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .meta { font-size: 13px; opacity: 0.7; }
  header .actions { display: flex; gap: 10px; }
  header button {
    background: #3250d8;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  header button:hover { background: #243fb0; }
  header button.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.3); }

  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Panneau de gauche : preview des slides */
  .preview-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    background: #e8e8ec;
  }
  .slide-preview {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
    border: 2px solid transparent;
    position: relative;
  }
  .slide-preview:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .slide-preview.active { border-color: #3250d8; }
  .slide-preview img {
    width: 100%;
    display: block;
    background: #8a9099;
    transition: opacity 0.15s;
  }
  .slide-preview.drag-over img { opacity: 0.35; }
  .slide-preview .drop-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(50, 80, 216, 0.12);
    border: 3px dashed #3250d8;
    border-radius: 8px;
    color: #3250d8;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .slide-preview .drop-overlay .drop-icon { font-size: 28px; }
  .slide-preview.drag-over .drop-overlay { opacity: 1; }
  .slide-preview .label {
    padding: 10px 14px;
    font-size: 12px;
    color: #666;
    display: flex;
    justify-content: space-between;
  }
  .slide-preview .role {
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    color: #3250d8;
  }

  /* Panneau de droite : éditeur */
  .edit-panel {
    width: 480px;
    background: white;
    border-left: 1px solid #ddd;
    overflow-y: auto;
    padding: 24px;
    flex-shrink: 0;
  }

  .empty-state {
    color: #888;
    font-size: 14px;
    text-align: center;
    padding: 60px 20px;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    border: 1px solid #d0d0d5;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fafafa;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: #3250d8;
    background: white;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field .hint {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }

  .image-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .image-actions button {
    flex: 1;
    background: #f0f0f3;
    border: 1px solid #d0d0d5;
    color: #333;
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .image-actions button:hover { background: #e4e4ea; }

  .drop-zone {
    margin-top: 12px;
    border: 2px dashed #d0d0d5;
    border-radius: 8px;
    padding: 18px;
    text-align: center;
    font-size: 12px;
    color: #999;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone.drag-over {
    border-color: #3250d8;
    background: #e8ecfb;
    color: #3250d8;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin: 24px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }

  .caption-section textarea { min-height: 200px; }
  .hashtags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .hashtag {
    background: #e8ecfb;
    color: #3250d8;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1d1d1f;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #b0342f; }

  .status {
    font-size: 12px;
    color: #888;
    font-style: italic;
  }
  .status.saving { color: #3250d8; }

  #p-canvas {
    position: relative;
    width: 432px;
    height: 540px;
    border-radius: 8px;
    border: 1px solid #ddd;
    overflow: hidden;
    user-select: none;
    touch-action: none;
    margin-top: 12px;
    cursor: default;
  }
  #p-handle {
    position: absolute;
    cursor: move;
  }
  #p-handle .p-border {
    border: 2px solid #3250d8;
    border-radius: 6px;
    box-shadow: 0 2px 12px rgba(50,80,216,0.35);
    position: relative;
  }
  #p-handle img { width: 100%; height: auto; display: block; border-radius: 4px; pointer-events: none; }
  #p-resize {
    position: absolute;
    right: -7px;
    bottom: -7px;
    width: 14px;
    height: 14px;
    background: #3250d8;
    border-radius: 50%;
    cursor: se-resize;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Carousel Drafter</h1>
    <div class="meta" id="draft-meta">Chargement...</div>
  </div>
  <div class="actions">
    <span class="status" id="save-status"></span>
    <button class="ghost" id="btn-render-all">Re-render toutes les slides</button>
    <button id="btn-open-folder">Ouvrir le dossier</button>
  </div>
</header>
<main>
  <div class="preview-panel" id="preview-panel"></div>
  <div class="edit-panel" id="edit-panel">
    <div class="empty-state">Clique sur une slide pour l'éditer</div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
let script = null;
let activeIdx = null;
let saveTimeout = null;
let canvasController = null;

// Empêche le navigateur de naviguer vers un fichier déposé hors cible
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());

async function loadScript() {
  const res = await fetch('/api/script');
  script = await res.json();
  document.getElementById('draft-meta').textContent =
    `${script.topic || 'Draft'} · ${script.slides.length} slides · template: ${script.template}`;
  renderPreviewPanel();
  renderCaptionSection();
}

function renderPreviewPanel() {
  const panel = document.getElementById('preview-panel');
  panel.innerHTML = '';
  script.slides.forEach((slide, idx) => {
    const div = document.createElement('div');
    div.className = 'slide-preview' + (idx === activeIdx ? ' active' : '');
    div.innerHTML = `
      <img src="/draft/slide-${String(idx + 1).padStart(2, '0')}.png?t=${Date.now()}" alt="">
      <div class="drop-overlay">
        <span class="drop-icon">🖼️</span>
        Déposer l'image ici
      </div>
      <div class="label">
        <span class="role">${slide.role || 'slide'}</span>
        <span>Slide ${idx + 1} / ${script.slides.length}</span>
      </div>
    `;
    div.onclick = () => selectSlide(idx);

    div.addEventListener('dragover', (e) => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', (e) => { if (!div.contains(e.relatedTarget)) div.classList.remove('drag-over'); });
    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) uploadImageFile(idx, file);
    });

    panel.appendChild(div);
  });
}

async function uploadImageFile(idx, file) {
  const formData = new FormData();
  formData.append('image', file);
  setStatus('Upload...', 'saving');
  const res = await fetch(`/api/upload-image/${idx}`, { method: 'POST', body: formData });
  const data = await res.json();
  if (data.ok) {
    script.slides[idx] = data.slide;
    toast('Image uploadée');
    renderPreviewPanel();
    if (idx === activeIdx) renderEditPanel();
    setStatus('');
  } else {
    toast('Erreur : ' + (data.error || 'inconnue'), 'error');
    setStatus('');
  }
}

function selectSlide(idx) {
  activeIdx = idx;
  document.querySelectorAll('.slide-preview').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  renderEditPanel();
}

function renderEditPanel() {
  const panel = document.getElementById('edit-panel');
  if (activeIdx === null) {
    panel.innerHTML = '<div class="empty-state">Clique sur une slide pour l\'éditer</div>';
    return;
  }
  const slide = script.slides[activeIdx];
  panel.innerHTML = `
    <h2 style="font-size: 16px; margin-bottom: 4px;">Slide ${activeIdx + 1}</h2>
    <p style="color: #888; font-size: 12px; margin-bottom: 20px;">Rôle : ${slide.role || 'slide'}</p>

    <div class="section-title">Texte</div>

    <div class="field">
      <label>Titre</label>
      <textarea id="f-title" rows="3">${escapeHtml(slide.title || '')}</textarea>
    </div>

    <div class="field">
      <label>Highlight (mot souligné en bleu)</label>
      <input type="text" id="f-highlight" value="${escapeHtml(slide.highlight || '')}">
      <div class="hint">Doit être un sous-ensemble exact du titre</div>
    </div>

    <div class="field">
      <label>Stat (affichée en monospace, optionnel)</label>
      <input type="text" id="f-stat" value="${escapeHtml(slide.stat || '')}">
    </div>

    <div class="field">
      <label>Corps de texte (optionnel)</label>
      <textarea id="f-body" rows="3">${escapeHtml(slide.body || '')}</textarea>
    </div>

    <div class="section-title">Image</div>

    <div class="field">
      <label>Stratégie de recherche</label>
      <input type="text" id="f-image-strategy" value="${escapeHtml(slide.image_strategy || 'none')}">
      <div class="hint">Ex: portrait:Sam Altman · logo:OpenAI · map:Taiwan · concept:warehouse robot · none</div>
    </div>

    ${slide.imageAttribution ? `<div class="hint" style="margin-bottom: 8px;">✓ ${escapeHtml(slide.imageAttribution)}</div>` : ''}
    ${slide.missingImageNote ? `<div class="hint" style="color: #b0342f; margin-bottom: 8px;">⚠ ${escapeHtml(slide.missingImageNote)}</div>` : ''}

    <input type="file" id="file-upload" accept="image/*" style="display:none">
    <div class="image-actions">
      <button id="btn-refetch">🔄 Relancer la recherche</button>
      <button id="btn-upload">📤 Uploader une image</button>
    </div>
    <div class="drop-zone" id="drop-zone">Glisse une image ici</div>

    <div class="section-title" style="margin-top:28px;">Placement de l'image</div>
    <div id="placement-canvas-section"></div>
  `;

  // Listeners sur les champs texte
  ['f-title', 'f-highlight', 'f-stat', 'f-body', 'f-image-strategy'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => scheduleSaveAndRender());
  });

  document.getElementById('btn-upload').onclick = () => document.getElementById('file-upload').click();
  document.getElementById('file-upload').onchange = (e) => {
    const file = e.target.files[0];
    if (file) uploadImageFile(activeIdx, file);
  };

  document.getElementById('btn-refetch').onclick = async () => {
    const strategy = document.getElementById('f-image-strategy').value;
    await saveAll();
    setStatus('Recherche en cours...', 'saving');
    const res = await fetch(`/api/refetch-image/${activeIdx}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ strategy }),
    });
    const data = await res.json();
    if (data.ok) {
      script.slides[activeIdx] = data.slide;
      toast(data.found ? 'Image trouvée' : 'Aucune image trouvée');
      renderPreviewPanel();
      renderEditPanel();
      setStatus('');
    } else {
      toast('Erreur : ' + (data.error || 'inconnue'), 'error');
      setStatus('');
    }
  };

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', (e) => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) uploadImageFile(activeIdx, file);
  });

  initPlacementCanvas(slide);
}

function initPlacementCanvas(slide) {
  if (canvasController) { canvasController.abort(); canvasController = null; }

  const section = document.getElementById('placement-canvas-section');
  if (!section) return;

  if (!slide.imageUrl) {
    section.innerHTML = '<p style="font-size:12px;color:#999;margin-top:8px;">Aucune image — glisse ou uploade une image pour la positionner.</p>';
    return;
  }

  canvasController = new AbortController();
  const { signal } = canvasController;

  const CW = 432, CH = 540; // canvas px (scale 0.4 du slide 1080×1350)
  const imgX = slide.imageX ?? 5;
  const imgY = slide.imageY ?? 50;
  const imgW = slide.imageW ?? 90;
  const px = (imgX / 100) * CW;
  const py = (imgY / 100) * CH;
  const pw = (imgW / 100) * CW;
  const slideNum = String(activeIdx + 1).padStart(2, '0');

  section.innerHTML = `
    <div id="p-canvas">
      <img src="/draft/slide-${slideNum}.png?t=${Date.now()}" style="width:100%;height:100%;object-fit:fill;display:block;pointer-events:none;" alt="">
      <div id="p-handle" style="left:${px}px;top:${py}px;width:${pw}px;">
        <div class="p-border">
          <img src="${slide.imageUrl}?t=${Date.now()}" alt="">
          <div id="p-resize"></div>
        </div>
      </div>
    </div>
    <p style="font-size:11px;color:#888;margin-top:6px;">Glisse l'image pour repositionner · Coin bas-droit pour redimensionner</p>
  `;

  const handle = document.getElementById('p-handle');
  const resizeBtn = document.getElementById('p-resize');

  let dragging = false, resizing = false;
  let startMX, startMY, startL, startT, startW;

  handle.addEventListener('mousedown', (e) => {
    if (resizeBtn.contains(e.target)) return;
    dragging = true;
    startMX = e.clientX; startMY = e.clientY;
    startL = parseFloat(handle.style.left);
    startT = parseFloat(handle.style.top);
    e.preventDefault();
  });

  resizeBtn.addEventListener('mousedown', (e) => {
    resizing = true;
    startMX = e.clientX;
    startW = parseFloat(handle.style.width);
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('mousemove', (e) => {
    if (dragging) {
      const newL = Math.max(0, Math.min(CW - parseFloat(handle.style.width), startL + e.clientX - startMX));
      const newT = Math.max(0, Math.min(CH - 20, startT + e.clientY - startMY));
      handle.style.left = newL + 'px';
      handle.style.top = newT + 'px';
    } else if (resizing) {
      const newW = Math.max(40, Math.min(CW - parseFloat(handle.style.left), startW + e.clientX - startMX));
      handle.style.width = newW + 'px';
    }
  }, { signal });

  document.addEventListener('mouseup', () => {
    if (!dragging && !resizing) return;
    dragging = false; resizing = false;
    const s = script.slides[activeIdx];
    s.imageX = Math.round((parseFloat(handle.style.left) / CW) * 1000) / 10;
    s.imageY = Math.round((parseFloat(handle.style.top)  / CH) * 1000) / 10;
    s.imageW = Math.round((parseFloat(handle.style.width) / CW) * 1000) / 10;
    saveAll().then(() => renderSlide(activeIdx));
  }, { signal });
}

function renderCaptionSection() {
  // Ajoute la section caption tout en bas du edit-panel si activeIdx est null
  // On gère la caption via un panneau séparé accessible via un bouton "Voir la caption"
  // Pour simplifier, on ajoute un onglet en bas du preview-panel
  const existing = document.getElementById('caption-panel');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.id = 'caption-panel';
  div.style.cssText = 'background: white; border-radius: 10px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);';
  div.innerHTML = `
    <h3 style="font-size: 14px; margin-bottom: 12px;">Caption Instagram</h3>
    <textarea id="f-caption" style="width:100%; min-height:180px; border:1px solid #d0d0d5; border-radius:6px; padding:10px; font-size:13px; font-family:inherit; background:#fafafa;">${escapeHtml(script.caption || '')}</textarea>
    <h4 style="font-size: 12px; margin: 16px 0 8px; color: #666; text-transform: uppercase;">Hashtags</h4>
    <textarea id="f-hashtags" style="width:100%; min-height:60px; border:1px solid #d0d0d5; border-radius:6px; padding:10px; font-size:13px; font-family:inherit; background:#fafafa;">${escapeHtml((script.hashtags || []).join(' '))}</textarea>
    <div class="hint" style="font-size:11px; color:#888; margin-top:6px;">Séparés par des espaces</div>
  `;
  document.getElementById('preview-panel').appendChild(div);

  document.getElementById('f-caption').addEventListener('input', () => scheduleSave());
  document.getElementById('f-hashtags').addEventListener('input', () => scheduleSave());
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  setStatus('Modifications non sauvegardées', 'saving');
  saveTimeout = setTimeout(saveAll, 600);
}

function scheduleSaveAndRender() {
  clearTimeout(saveTimeout);
  setStatus('Modifications non sauvegardées', 'saving');
  saveTimeout = setTimeout(async () => {
    await saveAll();
    await renderSlide(activeIdx);
  }, 700);
}

async function saveAll() {
  // Récupérer les valeurs des champs si une slide est active
  if (activeIdx !== null) {
    const slide = script.slides[activeIdx];
    const titleEl = document.getElementById('f-title');
    if (titleEl) {
      slide.title = titleEl.value;
      slide.highlight = document.getElementById('f-highlight').value;
      slide.stat = document.getElementById('f-stat').value;
      slide.body = document.getElementById('f-body').value;
      slide.image_strategy = document.getElementById('f-image-strategy').value;
    }
  }
  const captionEl = document.getElementById('f-caption');
  if (captionEl) {
    script.caption = captionEl.value;
    script.hashtags = document.getElementById('f-hashtags').value
      .split(/\s+/).filter(h => h.startsWith('#'));
  }
  setStatus('Sauvegarde...', 'saving');
  await fetch('/api/script', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(script),
  });
  setStatus('Sauvegardé ✓');
  setTimeout(() => setStatus(''), 1500);
}

async function renderSlide(idx) {
  setStatus('Rendu slide ' + (idx + 1) + '...', 'saving');
  const res = await fetch(`/api/render/${idx}`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    const imgs = document.querySelectorAll('.slide-preview img');
    if (imgs[idx]) imgs[idx].src = data.url;
    // Rafraîchir aussi le fond du canvas de placement
    if (idx === activeIdx) {
      const canvasBg = document.querySelector('#p-canvas > img');
      if (canvasBg) canvasBg.src = data.url;
    }
    setStatus('Rendu ✓');
    setTimeout(() => setStatus(''), 1500);
  } else {
    toast('Erreur de rendu : ' + (data.error || 'inconnue'), 'error');
    setStatus('');
  }
}

document.getElementById('btn-render-all').onclick = async () => {
  setStatus('Rendu de toutes les slides...', 'saving');
  const res = await fetch('/api/render-all', { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    renderPreviewPanel();
    toast(`${data.count} slides re-rendues`);
    setStatus('');
  } else {
    toast('Erreur : ' + (data.error || 'inconnue'), 'error');
  }
};

document.getElementById('btn-open-folder').onclick = () => {
  toast('Dossier indiqué dans le terminal');
};

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function setStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

function toast(msg, cls) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (cls || '');
  setTimeout(() => { el.className = 'toast ' + (cls || ''); }, 2200);
}

loadScript();
</script>
</body>
</html>
